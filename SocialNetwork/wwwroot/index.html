<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Friends</title>
</head>
<body>

<h2>Добавить друга</h2>
<input id="AccountId" placeholder="Account Id" />
<input id="FriendId" placeholder="Friend ID" />
<input id="Status" placeholder="Status" />
<button onclick="addFriend()">Добавить</button>

<h2>Список друзей</h2>
<ul id="friendsList"></ul>

<script>
    const API_URL = "http://localhost:5063/api/friend";

    async function addFriend() {
        try {
            const friendId = document.getElementById("FriendId").value;
            const accountId = document.getElementById("AccountId").value;
            const status = document.getElementById("Status").value;

            // Создаем плоский объект
            const friendData = {
                accountId: parseInt(accountId),
                friendId: parseInt(friendId),
                status: status
            };

            const res = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                // Отправляем объект напрямую, без ключа "friend"
                body: JSON.stringify(friendData)
            });

            if (!res.ok) {
                const errorText = await res.text();
                throw new Error(`Ошибка: ${res.status} - ${errorText}`);
            }

            await loadFriends();
        } catch (e) {
            console.error("addFriend error:", e);
        }
    }


    async function loadFriends() {
        try {
            console.log("script loaded");
            const res = await fetch(API_URL);

            if (!res.ok) throw new Error("Ошибка загрузки");

            const data = await res.json();

            const list = document.getElementById("friendsList");
            list.innerHTML = "";

            data.forEach(f => {
                const li = document.createElement("li");
                li.innerText = `User ${f.accountId} → ${f.friendId} (${f.status})`;
                list.appendChild(li);
            });

        } catch (e) {
            console.error("loadFriends error:", e);
        }
    }
    
    console.log("script loaded");
    

    document.addEventListener("DOMContentLoaded", () => {
        console.log("DOM ready");
        loadFriends();
    });
</script>

</body>
</html>
